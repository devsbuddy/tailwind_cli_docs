name: Deploy Site (Nuxt + VitePress)

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Install ALL deps (single package.json)
      - name: Install dependencies
        run: npm ci

      # ---------------------------
      # Build Nuxt (root app)
      # ---------------------------
      - name: Generate Nuxt static site
        run: npm run generate

      # expects output: .output/public

      # ---------------------------
      # Build VitePress
      # ---------------------------
      - name: Build VitePress
        run: npm run docs:build

      # expects output: docs/.vitepress/dist

      # ---------------------------
      # Merge builds
      # ---------------------------
      - name: Merge outputs
        run: |
          rm -rf dist
          mkdir dist

          # Nuxt → root
          cp -r .output/public/* dist/

          # VitePress → /docs
          mkdir -p dist/docs
          cp -r docs/.vitepress/dist/* dist/docs/

          # SPA fallback (optional but useful)
          cp dist/index.html dist/404.html

      # ---------------------------
      # Upload
      # ---------------------------
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
